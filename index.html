<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>منصة الأعضاء</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="login-page-body">
  <div id="login-page" class="login-container login-container--member">
    <div class="login-box">
      <div class="login-header">
        <div class="logo-circle">⟡</div>
        <h1>منصة الأعضاء</h1>
        <p>لوحة الأعضاء والتدريبات</p>
      </div>

      <form id="member-login-form" class="login-form" onsubmit="handleMemberLogin(event)">
        <div class="form-field">
          <label for="username">اسم المستخدم</label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="أدخل اسم المستخدم"
            autocomplete="username"
            required
          />
        </div>

        <div class="form-field">
          <label for="member-password">الكود</label>
          <input
            type="password"
            id="member-password"
            name="password"
            placeholder="أدخل الكود"
            autocomplete="current-password"
            required
          />
        </div>

        <button type="submit" class="login-button">دخول</button>
      </form>

      <div class="login-footer">
        <span class="login-divider">أو</span>
        <a href="admin.html" class="admin-link">دخول الإدارة</a>
      </div>
    </div>
  </div>

  <div id="main-page" class="app-shell" style="display: none;">
    <header class="site-top-header">
      <div class="brand brand-small">
        <div class="logo">⟡</div>
        <span>منصة الأعضاء</span>
      </div>
    </header>
    <main id="main-content" class="main-content"></main>
  </div>

  <script src="app.js" defer></script>
</body>
</html>
