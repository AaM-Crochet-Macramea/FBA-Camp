<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>صفحة الإدارة</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="login-page-body">
  <div id="admin-login-page" class="login-container login-container--admin">
    <div class="login-box login-box--admin">
      <div class="login-header">
        <div class="logo-circle logo-admin">◈</div>
        <h1>لوحة الإدارة</h1>
        <p>إدارة بيانات الأعضاء ومؤشرات الأداء</p>
      </div>

      <form id="admin-login-form" class="login-form" onsubmit="handleAdminLogin(event)">
        <div class="form-field">
          <label for="admin-username">اسم المستخدم</label>
          <input
            type="text"
            id="admin-username"
            name="username"
            placeholder="أدخل اسم المستخدم"
            autocomplete="username"
            required
          />
        </div>

        <div class="form-field">
          <label for="admin-password">كلمة المرور</label>
          <input
            type="password"
            id="admin-password"
            name="password"
            placeholder="أدخل كلمة المرور"
            autocomplete="current-password"
            required
          />
        </div>

        <button type="submit" class="login-button">دخول</button>
      </form>

      <div class="login-footer">
        <a href="index.html" class="member-link">العودة إلى دخول الأعضاء</a>
      </div>
    </div>
  </div>

  <div id="admin-page" class="app-shell admin-shell" style="display: none;">
    <header class="site-top-header admin-header">
      <div class="brand brand-small">
        <div class="logo">⟡</div>
        <span>لوحة الإدارة</span>
      </div>
    </header>

    <main id="admin-content" class="main-content admin-main"></main>
  </div>

  <script src="app.js" defer></script>
</body>
</html>
